<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Converter</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bodytag">
        <div class="container">
            <h2 class="title">CYBER<span class="glow">CONVERT</span></h2>
            
            <div class="input-section">
                <span class="ui-label">ENTER VALUE</span>
                <input type="number" class="ip1" placeholder="Type here...">
                
                <span class="ui-label">FROM UNIT</span>
                <select id="unitSelector">
                    <option value="nothing">SELECT UNIT</option>
                    <option value="km">KILOMETERS (KM)</option>
                    <option value="meter">METERS (M)</option>
                    <option value="cm">CENTIMETERS (CM)</option>
                    <option value="feet">FEET (FT)</option>
                    <option value="miles">MILES (MI)</option>
                </select>
            </div>

            <button class="btn-neon">INITIALIZE CONVERSION</button>
            
            <div id="statusLabel" class="status-msg"></div>

            <span class="ui-label center">TO ALL UNITS</span>
            <div class="data-container">
                <div class="result-box">
                    <span class="label">KILOMETERS</span>
                    <span class="value km">--</span>
                </div>
                <div class="result-box">
                    <span class="label">METERS</span>
                    <span class="value meter">--</span>
                </div>
                <div class="result-box">
                    <span class="label">MILES</span>
                    <span class="value miles">--</span>
                </div>
                <div class="result-box">
                    <span class="label">CM</span>
                     <span class="value cm">--</span>
                </div>
                <div class="result-box">
                    <span class="label">FEET</span>
                     <span class="value feet">--</span>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./index.js"></script>
</body>
</html>
